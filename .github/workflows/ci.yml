name: CPU checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Static checks
        run: ruff check --select E9,F63,F7,F82 src tests
      - name: Formatting
        run: ruff format --check src/checkpoint.py src/eval_utils.py src/experiments.py src/plot_experiments.py src/prompts.py src/routing.py tests
      - name: CPU tests
        run: pytest -q
